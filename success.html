<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed | SOC 2 Readiness Assessment</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #F9FAFB;
  color: #111827;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 20px;
  padding: 56px 48px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.08);
}

.icon {
  width: 72px;
  height: 72px;
  background: #DCFCE7;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 36px;
}

h1 {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 12px;
  color: #111827;
}

.subtitle {
  font-size: 16px;
  color: #6B7280;
  line-height: 1.6;
  margin-bottom: 36px;
}

.customer-email {
  display: inline-block;
  background: #EFF6FF;
  color: #1D4ED8;
  font-weight: 600;
  font-size: 14px;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 36px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px 28px;
  background: #2563EB;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s, transform .15s;
}
.btn:hover { background: #1D4ED8; transform: translateY(-1px); }

.loading {
  color: #6B7280;
  font-size: 16px;
}
.spinner {
  display: inline-block;
  width: 28px;
  height: 28px;
  border: 3px solid #DBEAFE;
  border-top-color: #2563EB;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state { color: #B91C1C; font-size: 15px; line-height: 1.6; }
.error-state a { color: #2563EB; }

.note {
  font-size: 12px;
  color: #9CA3AF;
  margin-top: 20px;
}

@media (max-width: 480px) {
  .card { padding: 40px 24px; }
  h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="spinner"></div>
  <p class="loading">Confirming your payment…</p>
</div>

<script>
const API_BASE = 'http://localhost:3000';

async function verifyAndRender() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const card = document.getElementById('card');

  if (!sessionId) {
    renderError(card, 'No session ID found in the URL. Please contact support.');
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/verify-session?session_id=${encodeURIComponent(sessionId)}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Verification failed');

    if (data.payment_status !== 'paid') {
      renderError(card, `Payment status is <strong>${data.payment_status}</strong>. If you completed payment, please wait a moment and refresh the page.`);
      return;
    }

    renderSuccess(card, data.email, sessionId);
  } catch (err) {
    renderError(card, `Could not verify payment: ${err.message}. Make sure the server is running on port 3000.`);
  }
}

function renderSuccess(card, email, sessionId) {
  const resultsUrl = `index.html?session_id=${encodeURIComponent(sessionId)}`;
  card.innerHTML = `
    <div class="icon">✓</div>
    <h1>You're all set!</h1>
    <p class="subtitle">
      Your SOC 2 Readiness Full Report is ready. Click below to view your
      complete domain breakdown, all findings, and your AI-powered action plan.
    </p>
    ${email ? `<span class="customer-email">${escapeHtml(email)}</span>` : ''}
    <a class="btn" href="${resultsUrl}">View My Full Report →</a>
    <p class="note">Your results are stored in this browser. Bookmark the link above to return anytime.</p>
  `;
}

function renderError(card, message) {
  card.innerHTML = `
    <div class="icon" style="background:#FEE2E2">⚠️</div>
    <h1>Something went wrong</h1>
    <p class="error-state">${message}</p>
    <p class="note" style="margin-top:24px"><a href="index.html">← Back to assessment</a></p>
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

verifyAndRender();
</script>
</body>
</html>
